<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel - Citas Médicas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .logout-btn {
      background: #ef4444;
      border: none;
      padding: 10px 15px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .card h3 {
      margin-top: 0;
    }

    .btn {
      background: #22c55e;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<header>
  <h1>Panel de Citas Médicas</h1>
  <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

  <div class="card">
    <h3>Bienvenido 👨‍⚕️</h3>
    <p id="userEmail">Cargando usuario...</p>
  </div>

  <div class="card">
    <h3>Acciones rápidas</h3>
    <button class="btn" onclick="alert('Aquí luego agregamos crear cita')">
      Crear nueva cita
    </button>
  </div>

  <div class="card">
    <h3>Próximamente</h3>
    <p>📅 Lista de citas</p>
    <p>👥 Pacientes</p>
    <p>💰 Pagos</p>
  </div>

</div>

<!-- 🔥 SCRIPT FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔧 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDn-ETfal7IEjghIaZJlbPRTgyOl3BUcKE",
  authDomain: "cita-medica-b4c8c.firebaseapp.com",
  projectId: "cita-medica-b4c8c",
};

// 🚀 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 VALIDAR SESIÓN
onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log("✅ Usuario activo:", user.email);
    document.getElementById("userEmail").textContent = user.email;
  } else {
    console.log("❌ No hay sesión");
    window.location.href = "index.html";
  }
});

// 🚪 LOGOUT GLOBAL
window.logout = function () {
  signOut(auth).then(() => {
    console.log("👋 Sesión cerrada");
    window.location.href = "index.html";
  });
};

</script>

</body>
</html>
